<!DOCTYPE html>
<html lang="vi" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Giám sát TTHC - UBND Xã Cát Ngạn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full font-sans text-gray-800">

    <header class="bg-red-700 text-white shadow-md p-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold">UBND XÃ CÁT NGẠN</h1>
            <p class="text-sm opacity-90">Hệ thống Giám sát Tiến độ TTHC</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-900 border-b pb-3 mb-4">Tiếp Nhận & Vào Sổ Hồ Sơ Mới</h3>
            <form id="newDossierForm" onsubmit="handleCreateDossier(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Mã hồ sơ</label>
                    <input type="text" id="dossierId" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Công dân</label>
                    <input type="text" id="citizenName" required class="w-full px-3 py-2 border rounded-lg text-sm">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Loại Thủ tục Hành chính</label>
                    <select id="procedureType" onchange="onProcedureChange()" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <!-- Văn phòng HĐND-UBND -->
                        <optgroup label="Văn phòng HĐND - UBND">
                            <option value="Thủ tục chứng thực văn bản thỏa thuận phân chia di sản" data-dept="Văn phòng HĐND - UBND" data-field="Chứng thực">Thủ tục chứng thực văn bản thỏa thuận phân chia di sản</option>
                            <option value="Đăng ký khai tử" data-dept="Văn phòng HĐND - UBND" data-field="Hộ tịch">Đăng ký khai tử</option>
                            <option value="Thủ tục đăng ký kết hôn" data-dept="Văn phòng HĐND - UBND" data-field="Hộ tịch">Thủ tục đăng ký kết hôn</option>
                        </optgroup>
                        <!-- Phòng Kinh tế -->
                        <optgroup label="Phòng Kinh tế">
                            <option value="Cấp lại, đổi, điều chỉnh thông tin trên sổ BHXH, thẻ BHYT" data-dept="Phòng Kinh tế" data-field="Cấp sổ BHXH, thẻ BHYT">Cấp lại, đổi, điều chỉnh thông tin trên sổ BHXH, thẻ BHYT</option>
                            <option value="Đăng ký thành lập hộ kinh doanh" data-dept="Phòng Kinh tế" data-field="Thành lập doanh nghiệp">Đăng ký thành lập hộ kinh doanh</option>
                            <option value="Đăng ký đất đai lần đầu" data-dept="Phòng Kinh tế" data-field="Đất Đai">Đăng ký đất đai lần đầu</option>
                        </optgroup>
                        <!-- Phòng Văn hóa - Xã hội -->
                        <optgroup label="Phòng Văn hóa - Xã hội">
                            <option value="Xác định mức độ khuyết tật" data-dept="Phòng Văn hóa - Xã hội" data-field="Bảo trợ xã hội">Xác định mức độ khuyết tật</option>
                            <option value="Thăm viếng mộ liệt sĩ" data-dept="Phòng Văn hóa - Xã hội" data-field="Người có công">Thăm viếng mộ liệt sĩ</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Lĩnh vực</label>
                    <input type="text" id="targetField" readonly class="w-full px-3 py-2 bg-gray-100 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Đơn vị giải quyết</label>
                    <input type="text" id="targetDept" readonly class="w-full px-3 py-2 bg-gray-100 border rounded-lg text-sm">
                </div>

                <div class="md:col-span-2 flex justify-end">
                    <button type="submit" class="bg-red-700 text-white px-6 py-2 rounded-lg text-sm font-bold">Lưu hồ sơ</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function onProcedureChange() {
            const selector = document.getElementById("procedureType");
            const selected = selector.options[selector.selectedIndex];
            document.getElementById("targetDept").value = selected.getAttribute("data-dept");
            document.getElementById("targetField").value = selected.getAttribute("data-field");
        }
        
        // Initial setup
        window.onload = onProcedureChange;

        async function handleCreateDossier(e) {
            e.preventDefault();
            const data = {
                id: document.getElementById('dossierId').value,
                citizen: document.getElementById('citizenName').value,
                procedure: document.getElementById('procedureType').value,
                dept: document.getElementById('targetDept').value,
                field: document.getElementById('targetField').value,
                created_at: new Date().toISOString(),
                deadline_date: "2026-07-20",
                officer: "Cán bộ Một cửa",
                deadline_hours: 24
            };
            
            const response = await fetch('/api/dossiers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if(response.ok) alert("Lưu hồ sơ thành công!");
        }
    </script>
</body>
</html>
